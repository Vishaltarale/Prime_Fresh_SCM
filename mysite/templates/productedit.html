{% extends "base.html" %}
{% block content %}

<div class="flex min-h-screen bg-gray-50">
    <div class="flex-1 md:ml-[260px] p-6">
        <div class="max-w-3xl mx-auto bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">Edit Inventory Batch</h2>

            <form action="{% url 'mysite:productupdate' %}" method="POST" class="space-y-6">
                {% csrf_token %}

                <!-- Product Name -->

                <input type="hidden" name="id" value="{{data.id}}">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Product Name</label>
                    <select name="product_name" required class="w-full border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary">
                        <option value="">Select a fruit</option>
                        <option value="Apple" {% if data.product_name == "Apple" %}selected{% endif %}>Apple</option>
                        <option value="Orange" {% if data.product_name == "Orange" %}selected{% endif %}>Orange</option>
                    </select>
                </div>

                <!-- Batch ID -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Batch ID</label>
                    <input type="text" name="batch_id" value="{{ data.batch_id }}" readonly class="w-full border border-gray-300 bg-gray-100 rounded-md px-3 py-2">
                </div>

                <!-- Quantity (kg) -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Quantity (kg)</label>
                    <input type="number" step="0.01" name="quantity_kg" value="{{ data.quantity_kg }}" required class="w-full border border-gray-300 rounded-md px-3 py-2">
                </div>

                <!-- Unit Price -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Unit Price (₹)</label>
                    <input type="number" step="0.01" name="unit_price" value="{{ data.unit_price }}" required class="w-full border border-gray-300 rounded-md px-3 py-2">
                </div>

                <!-- Arrival Date -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Arrival Date</label>
                    <input type="date" name="arrival_date" value="{{ data.arrival_date|date:'Y-m-d' }}" class="w-full border border-gray-300 rounded-md px-3 py-2">
                </div>

                <!-- Expiry Date -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Expiry Date</label>
                    <input type="date" name="expiry_date" value="{{ data.expiry_date|date:'Y-m-d' }}" class="w-full border border-gray-300 rounded-md px-3 py-2">
                </div>

                <!-- Storage Location -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Storage Location</label>
                    <input type="text" name="storage_location" value="{{ data.storage_location }}" class="w-full border border-gray-300 rounded-md px-3 py-2">
                </div>

                <!-- Status -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
                    <select name="status" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary">
                        <option value="">Select status</option>
                        <option value="Available" {% if data.status == "Available" %}selected{% endif %}>Available</option>
                        <option value="Low Stock" {% if data.status == "Low Stock" %}selected{% endif %}>Low Stock</option>
                        <option value="Out of Stock" {% if data.status == "Out of Stock" %}selected{% endif %}>Out of Stock</option>
                    </select>
                </div>

                <!-- Quality Grade -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Quality Grade</label>
                    <select name="quality_grade" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary">
                        <option value="">Select grade</option>
                        <option value="A" {% if data.quality_grade == "A" %}selected{% endif %}>Grade A</option>
                        <option value="B" {% if data.quality_grade == "B" %}selected{% endif %}>Grade B</option>
                        <option value="C" {% if data.quality_grade == "C" %}selected{% endif %}>Grade C</option>
                    </select>
                </div>

                <!-- Submit -->
                <div class="pt-4">
                    <button type="submit" class="bg-primary text-white px-6 py-2 rounded-md hover:bg-primary-dark transition">
                        Update Batch
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
