{% extends "base.html" %}
{% block content %}

<div class="flex min-h-screen bg-gray-50">
    <!-- Sidebar is already in base.html -->

    <!-- Main Content Area -->
    <div class="flex-1 md:ml-[260px] p-6">
        <div class="max-w-3xl mx-auto bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">Add New Inventory Batch</h2>

            <form action="{% url 'mysite:save_batch' %}" method="POST" class="space-y-6">
                {% csrf_token %}

                <!-- Product Name -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Product Name</label>
                    <select name="product_name" required class="w-full border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary">
                        <option value="">Select a fruit</option>
                        <option value="Apple">Apple</option>
                        <option value="Orange">Orange</option>
                    </select>
                </div>

                <!-- Batch ID -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Batch ID</label>
                    <input type="text" name="batch_id" required class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary">
                </div>

                <!-- Quantity (kg) -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Quantity (kg)</label>
                    <input type="number" step="0.01" name="quantity_kg" required class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary">
                </div>

                <!-- Unit Price -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Unit Price (₹)</label>
                    <input type="number" step="0.01" name="unit_price" required class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary">
                </div>

                <!-- Arrival Date -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Arrival Date</label>
                    <input type="date" name="arrival_date" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary">
                </div>

                <!-- Expiry Date -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Expiry Date</label>
                    <input type="date" name="expiry_date" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary">
                </div>

                <!-- Storage Location -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Storage Location</label>
                    <input type="text" name="storage_location" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary">
                </div>

                <!-- Status -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
                    <select name="status" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary">
                        <option value="">Select status</option>
                        <option value="Available">Available</option>
                        <option value="Low Stock">Low Stock</option>
                        <option value="Out of Stock">Out of Stock</option>
                    </select>
                </div>

                <!-- Quality Grade -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Quality Grade</label>
                    <select name="quality_grade" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary">
                        <option value="">Select grade</option>
                        <option value="A">Grade A</option>
                        <option value="B">Grade B</option>
                        <option value="C">Grade C</option>
                    </select>
                </div>

                <!-- Submit -->
                <div class="pt-4">
                    <button type="submit" class="bg-primary text-white px-6 py-2 rounded-md hover:bg-primary-dark transition">
                        Add Inventory
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
