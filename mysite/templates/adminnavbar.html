<header class="bg-white shadow p-4 flex justify-between items-center relative">
  <h1 class="text-lg font-semibold text-gray-700">Admin Dashboard</h1>

  {% if not on_profile_page %}
  <!-- User Dropdown -->
  <div class="relative group cursor-pointer">
    <div class="flex items-center gap-2" onclick="toggleDropdown()">
      <span class="text-sm text-gray-600">Welcome, {{ request.session.email }}</span>
      <img src="https://i.pravatar.cc/40" class="w-8 h-8 rounded-full border border-gray-300" alt="Avatar">
      <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
      </svg>
    </div>

    <!-- Dropdown Menu -->
    <div id="userDropdown" class="absolute right-0 mt-2 w-40 bg-white rounded-md shadow-lg border border-gray-200 z-50 hidden">
      <a href="{% url 'mysite:admin_profile' %}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Profile</a>
      <a href="{% url 'mysite:admin_logout' %}" class="block px-4 py-2 text-sm text-red-600 hover:bg-red-100">Logout</a>
    </div>
  </div>
  {% endif %}
</header>

<script>
  function toggleDropdown() {
    const dropdown = document.getElementById("userDropdown");
    dropdown.classList.toggle("hidden");
  }

  // Optional: Close dropdown when clicking outside
  document.addEventListener('click', function (e) {
    const dropdown = document.getElementById("userDropdown");
    const trigger = dropdown.previousElementSibling;

    if (!dropdown.contains(e.target) && !trigger.contains(e.target)) {
      dropdown.classList.add("hidden");
    }
  });
</script>
