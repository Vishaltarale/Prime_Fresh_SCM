{% extends "adminbase.html" %}
{% block content %}
<div class="p-4 md:ml-[240px] mt-[30px]">
  <div class="bg-white shadow-md rounded-lg p-6 max-w-6xl mx-auto">
    <h2 class="text-2xl font-semibold mb-6 text-gray-800 text-center">Edit Order</h2>

    <form method="POST" action="">
      {% csrf_token %}

      <!-- Customer Info -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
        <!-- Customer Dropdown -->
        <div class="mb-4">
          <label class="block text-gray-700 font-medium mb-1">Customer Name</label>
          <select name="customer_name" required
            class="w-full border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:ring focus:ring-blue-300">
            <option value="" disabled {% if not order.customer_name %}selected{% endif %}>Select a customer</option>
            {% for cust in Customers %}
              <option value="{{ cust.full_name }}"
                {% if order.customer_name == cust.id|stringformat:"s" %}selected{% endif %}>
                {{ cust.full_name }}
              </option>
            {% endfor %}
          </select>
        </div>

        <!-- Delivery Address -->
        <div>
          <label class="block text-sm font-medium text-gray-700">Delivery Address</label>
          <input type="text" name="delivery_address" value="{{ order.delivery_address }}"
                 class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring focus:ring-blue-300" required>
        </div>
      </div>

       <div class="mb-4">
          <label class="block text-gray-700 font-medium mb-1">Order Status</label>
        <select name="status[]" class="border rounded-md px-8 py-1 w-full">
            <option value="Pending" {% if item.status == "Pending" %}selected{% endif %}>Pending</option>
            <option value="Processing" {% if item.status == "Processing" %}selected{% endif %}>Processing</option>
            <option value="Completed" {% if item.status == "Completed" %}selected{% endif %}>Completed</option>
            <option value="Cancelled" {% if item.status == "Cancelled" %}selected{% endif %}>Cancelled</option>
        </select>
      </div>
      <!-- Warehouse -->
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700">Warehouse</label>
        <select name="warehouse_id" required
          class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring focus:ring-blue-300">
          <option value="">Select Warehouse</option>
          {% for wh in warehouses %}
            <option value="{{ wh.id }}"
              {% if order.warehouse.id|stringformat:"s" == wh.id|stringformat:"s" %}selected{% endif %}>
              {{ wh.warehouse_name }}
            </option>
          {% endfor %}
        </select>
      </div>

      <!-- Product Items -->
      <h3 class="text-lg font-semibold text-gray-800 mb-3">Products</h3>
      <div id="product_rows" class="space-y-4">
        {% for item in order.items %}
        <div class="grid grid-cols-1 md:grid-cols-6 gap-3 border p-3 rounded-md">

          <!-- Product dropdown -->
          <select name="product_name[]" class="col-span-2 border rounded-md px-2 py-1">
            <option value="">-- Select Product --</option>
            {% for p in products %}
              {% for pi in p.items %}
                <option value="{{ pi.product_name }}"
                        {% if item.product_name == pi.product_name %}selected{% endif %}>
                  {{ pi.product_name }} ({{ pi.sku }})
                </option>
              {% endfor %}
            {% endfor %}
          </select>

          <!-- SKU -->
          <input type="text" name="sku[]" value="{{ item.sku }}"
                 placeholder="SKU"
                 class="border rounded-md px-2 py-1">

          <!-- Category -->
          <select name="category[]" required class="border rounded-md px-2 py-1">
            <option value="">Select Category</option>
            {% for cat in categories %}
              <option value="{{ cat.id }}"
                {% if item.category and item.category.id|stringformat:"s" == cat.id|stringformat:"s" %}selected{% endif %}>
                {{ cat.name }}
              </option>
            {% endfor %}
          </select>

          <!-- Subcategory -->
          <select name="subcategory[]" required class="border rounded-md px-2 py-1">
            <option value="">Select Subcategory</option>
            {% for sub in subcategories %}
              <option value="{{ sub.id }}"
                {% if item.subcategory and item.subcategory.id|stringformat:"s" == sub.id|stringformat:"s" %}selected{% endif %}>
                {{ sub.name }}
              </option>
            {% endfor %}
          </select>

          <!-- Quantity -->
          <input type="number" name="quantity[]" value="{{ item.quantity }}"
                 min="1"
                 class="border rounded-md px-2 py-1">

          <!-- UOM -->
          <input type="text" name="uom[]" value="{{ item.uom }}"
                 placeholder="UOM"
                 class="border rounded-md px-2 py-1">

          <!-- Price -->
          <input type="number" step="0.01" name="price[]" value="{{ item.price }}"
                 placeholder="Price"
                 class="border rounded-md px-2 py-1">
        </div>
        {% endfor %}
      </div>

      <!-- Add row button -->
      <button type="button" onclick="addRow()"
              class="mt-3 bg-green-500 text-white px-4 py-2 rounded-md hover:bg-green-600 transition">
        + Add Product
      </button>

      <!-- Submit -->
      <div class="mt-6 text-center">
        <button type="submit"
                class="bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-600 transition">
          Update Order
        </button>
      </div>
    </form>
  </div>
</div>

<script>
function addRow() {
  const container = document.getElementById("product_rows");
  const row = document.createElement("div");
  row.className = "grid grid-cols-1 md:grid-cols-6 gap-3 border p-3 rounded-md";
  row.innerHTML = `
    <select name="product_name[]" class="col-span-2 border rounded-md px-2 py-1">
      <option value="">-- Select Product --</option>
      {% for p in products %}
        {% for pi in p.items %}
          <option value="{{ pi.product_name }}">{{ pi.product_name }} ({{ pi.sku }})</option>
        {% endfor %}
      {% endfor %}
    </select>

    <input type="text" name="sku[]" placeholder="SKU" class="border rounded-md px-2 py-1">

    <select name="category[]" required class="border rounded-md px-2 py-1">
      <option value="">Select Category</option>
      {% for cat in categories %}
        <option value="{{ cat.id }}">{{ cat.name }}</option>
      {% endfor %}
    </select>

    <select name="subcategory[]" required class="border rounded-md px-2 py-1">
      <option value="">Select Subcategory</option>
      {% for sub in subcategories %}
        <option value="{{ sub.id }}">{{ sub.name }}</option>
      {% endfor %}
    </select>

    <input type="number" name="quantity[]" min="1" class="border rounded-md px-2 py-1">
    <input type="text" name="uom[]" placeholder="UOM" class="border rounded-md px-2 py-1">
    <input type="number" step="0.01" name="price[]" placeholder="Price" class="border rounded-md px-2 py-1">
  `;
  container.appendChild(row);
}
</script>
{% endblock %}
