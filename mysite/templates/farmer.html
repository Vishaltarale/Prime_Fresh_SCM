{% extends 'adminbase.html' %}

{% block content %}
<div class="max-w-4xl mx-auto bg-white p-8 rounded-lg shadow">
  <h2 class="text-2xl font-bold mb-6 text-green-700">Farmer Registration</h2>

  <form action="{% url 'mysite:farmer_register' %}" method="POST" class="space-y-6">
    {% csrf_token %}

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- Full Name -->
      <div>
        <label class="block text-sm font-medium text-gray-700">Full Name</label>
        <input type="text" name="full_name" required
               class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-green-400">
      </div>

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-gray-700">Email</label>
        <input type="email" name="email" required
               class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-green-400">
      </div>

      <!-- Phone -->
      <div>
        <label class="block text-sm font-medium text-gray-700">Phone Number</label>
        <input type="text" name="phone" required
               class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-green-400">
      </div>

      <!-- Address -->
      <div>
        <label class="block text-sm font-medium text-gray-700">Address</label>
        <input type="text" name="address" required
               class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-green-400">
      </div>

      <!-- Village -->
      <div>
        <label class="block text-sm font-medium text-gray-700">Village</label>
        <input type="text" name="village" required
               class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-green-400">
      </div>

      <!-- District -->
      <div>
        <label class="block text-sm font-medium text-gray-700">District</label>
        <input type="text" name="district" required
               class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-green-400">
      </div>

      <!-- State -->
      <div>
        <label class="block text-sm font-medium text-gray-700">State</label>
        <input type="text" name="state" required
               class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-green-400">
      </div>

      <!-- Registration Date -->
      <div>
        <label class="block text-sm font-medium text-gray-700">Registration Date</label>
        <input type="date" name="registration_date" required
               class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-green-400">
      </div>
    </div>

    <!-- Submit -->
    <div class="pt-4">
      <button type="submit"
              class="px-6 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 transition shadow">
        Register Farmer
      </button>
    </div>
  </form>
</div>
{% endblock %}
