{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-slate-50 via-green-50 to-emerald-100 p-6 md:ml-[260px]">
  <div class="max-w-5xl mx-auto bg-white rounded-2xl shadow-lg overflow-hidden">
    
    <!-- Header -->
    <div class="bg-gradient-to-r from-green-600 to-emerald-600 px-6 py-4">
      <h2 class="text-2xl md:text-3xl font-bold text-white">Farmer Registration</h2>
    </div>

    <!-- Form -->
    <div class="p-8">
      <form action="{% url 'mysite:farmer_register' %}" method="POST" class="space-y-8">
        {% csrf_token %}

        <!-- Grid Inputs -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

          <!-- Full Name -->
          <div>
            <label class="block text-sm font-semibold text-gray-700">Full Name</label>
            <input type="text" name="full_name" required
                   class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-green-400 focus:border-green-400 transition">
          </div>

          <!-- Email -->
          <div>
            <label class="block text-sm font-semibold text-gray-700">Email</label>
            <input type="email" name="email" required
                   class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-green-400 focus:border-green-400 transition">
          </div>

          <!-- Phone -->
          <div>
            <label class="block text-sm font-semibold text-gray-700">Phone Number</label>
            <input type="text" name="phone" required
                   class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-green-400 focus:border-green-400 transition">
          </div>

          <!-- Address -->
          <div>
            <label class="block text-sm font-semibold text-gray-700">Address</label>
            <input type="text" name="address" required
                   class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-green-400 focus:border-green-400 transition">
          </div>

          <!-- Village -->
          <div>
            <label class="block text-sm font-semibold text-gray-700">Village</label>
            <input type="text" name="village" required
                   class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-green-400 focus:border-green-400 transition">
          </div>

          <!-- District -->
          <div>
            <label class="block text-sm font-semibold text-gray-700">District</label>
            <input type="text" name="district" required
                   class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-green-400 focus:border-green-400 transition">
          </div>

          <!-- State -->
          <div>
            <label class="block text-sm font-semibold text-gray-700">State</label>
            <input type="text" name="state" required
                   class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-green-400 focus:border-green-400 transition">
          </div>

          <!-- Registration Date -->
          <div>
            <label class="block text-sm font-semibold text-gray-700">Registration Date</label>
            <input type="date" name="registration_date" required
                   class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-green-400 focus:border-green-400 transition">
          </div>
        </div>

        <!-- Submit Button -->
        <div class="pt-4">
          <button type="submit"
                  class="px-8 py-3 bg-green-600 text-white font-semibold rounded-lg shadow hover:bg-green-700 focus:ring-2 focus:ring-green-400 transition">
            Register Farmer
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
