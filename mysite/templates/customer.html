{% extends 'base.html' %}

{% block content %}
<section class="p-4 md:ml-[240px] mt-6 flex justify-center">
  <div class="w-full max-w-3xl bg-white p-6 md:p-8 rounded-lg shadow-lg">
    <h2 class="text-2xl font-bold mb-6 text-purple-700 text-center">Customer Registration</h2>

    <form action="{% url 'mysite:customer_register' %}" method="POST" class="space-y-6">
      {% csrf_token %}

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Full Name -->
        <div>
          <label class="block text-sm md:text-base font-medium text-gray-700">Full Name</label>
          <input type="text" name="full_name" required
                 class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-purple-400 focus:border-purple-400">
        </div>

        <!-- Email -->
        <div>
          <label class="block text-sm md:text-base font-medium text-gray-700">Email</label>
          <input type="email" name="email" required
                 class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-purple-400 focus:border-purple-400">
        </div>

        <!-- Phone -->
        <div>
          <label class="block text-sm md:text-base font-medium text-gray-700">Phone Number</label>
          <input type="text" name="phone" required
                 class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-purple-400 focus:border-purple-400">
        </div>

        <!-- Address -->
        <div>
          <label class="block text-sm md:text-base font-medium text-gray-700">Address</label>
          <input type="text" name="address" required
                 class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-purple-400 focus:border-purple-400">
        </div>

        <!-- City -->
        <div>
          <label class="block text-sm md:text-base font-medium text-gray-700">City</label>
          <input type="text" name="city" required
                 class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-purple-400 focus:border-purple-400">
        </div>

        <!-- State -->
        <div>
          <label class="block text-sm md:text-base font-medium text-gray-700">State</label>
          <input type="text" name="state" required
                 class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-purple-400 focus:border-purple-400">
        </div>

        <!-- Registration Date -->
        <div class="md:col-span-2">
          <label class="block text-sm md:text-base font-medium text-gray-700">Registration Date</label>
          <input type="date" name="registration_date" required
                 class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-purple-400 focus:border-purple-400">
        </div>
      </div>

      <!-- Submit Button -->
      <div class="pt-4">
        <button type="submit"
                class="w-full md:w-auto px-6 py-2 bg-purple-600 text-white rounded-md hover:bg-purple-700 transition shadow">
          Register Customer
        </button>
      </div>
    </form>
  </div>
</section>
{% endblock %}
