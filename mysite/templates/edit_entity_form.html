{% extends 'adminbase.html' %}
{% load custom_tags %}
{% block content %}
<div class="p-6 max-w-xl mx-auto bg-white rounded shadow">
  <h2 class="text-2xl font-bold mb-4">Edit {{ entity|title }}</h2>
  <form method="POST">
    {% csrf_token %}
    {% for field in fields %}
      <label class="block mb-2 mt-4 text-gray-700 capitalize">{{ field }}</label>
      <input type="text" name="{{ field }}" value="{{ instance|get_attribute:field }}" class="w-full border border-gray-300 p-2 rounded">
    {% endfor %}
    <button type="submit" class="mt-6 bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Save</button>
  </form>
</div>
{% endblock %}
