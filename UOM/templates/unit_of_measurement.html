{% extends 'base.html' %}

{% block content %}
<div class="p-4 md:ml-[240px] mt-6 flex justify-center">
  <!-- Card Container -->
  <div class="w-full max-w-2xl bg-white shadow-lg rounded-xl p-6 md:p-8">
    
    <!-- Title -->
    <h2 class="text-xl md:text-2xl font-bold text-cyan-700 mb-6 text-center md:text-left">
      Add Unit of Measurement (UOM)
    </h2>

    <!-- Form -->
    <form action="{% url 'UOM:uom_register' %}" method="POST" class="space-y-6">
      {% csrf_token %}

      <!-- UOM Name -->
      <div>
        <label class="block text-sm md:text-base font-medium text-gray-700">UOM Name</label>
        <input type="text" name="name" required placeholder="e.g., KG, LTR"
               class="mt-1 block w-full px-3 py-2 text-sm md:text-base border rounded-lg focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400">
      </div>

      <!-- Description -->
      <div>
        <label class="block text-sm md:text-base font-medium text-gray-700">Description</label>
        <textarea name="description" rows="2" placeholder="e.g., Kilogram, Litre"
                  class="mt-1 block w-full px-3 py-2 text-sm md:text-base border rounded-lg focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400"></textarea>
      </div>

      <!-- Submit Button -->
      <div class="pt-4 flex justify-center md:justify-start">
        <button type="submit"
                class="px-5 md:px-6 py-2 md:py-2.5 bg-cyan-600 text-white text-sm md:text-base font-medium rounded-lg hover:bg-cyan-700 transition shadow-md">
          Save UOM
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
