{% extends 'base.html' %}

{% block content %}
<div class="p-4 md:ml-[240px] mt-6 flex justify-center">
  
  <!-- Card Wrapper -->
  <div class="w-full max-w-3xl bg-white rounded-xl shadow-lg p-6 md:p-8">
    
    <!-- Title -->
    <h2 class="text-xl md:text-2xl font-bold text-pink-700 mb-6 text-center md:text-left">
      Add UOM Conversion
    </h2>

    <!-- Form -->
    <form action="{% url 'UOM:conversion_register' %}" method="POST" class="space-y-6">
      {% csrf_token %}

      <!-- Form Grid -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <!-- From UOM -->
        <div>
          <label class="block text-sm md:text-base font-medium text-gray-700">From Unit</label>
          <select name="from_uom" required
                  class="mt-1 block w-full px-3 py-2 text-sm md:text-base border rounded-lg bg-white focus:ring-2 focus:ring-pink-400 focus:border-pink-400">
            <option value="">-- Select UOM --</option>
            {% for u in uoms %}
              <option value="{{ u.id }}">{{ u.name }}</option>
            {% endfor %}
          </select>
        </div>

        <!-- To UOM -->
        <div>
          <label class="block text-sm md:text-base font-medium text-gray-700">To Unit</label>
          <select name="to_uom" required
                  class="mt-1 block w-full px-3 py-2 text-sm md:text-base border rounded-lg bg-white focus:ring-2 focus:ring-pink-400 focus:border-pink-400">
            <option value="">-- Select UOM --</option>
            {% for u in uoms %}
              <option value="{{ u.id }}">{{ u.name }}</option>
            {% endfor %}
          </select>
        </div>

        <!-- Conversion Factor -->
        <div class="md:col-span-2">
          <label class="block text-sm md:text-base font-medium text-gray-700">Conversion Factor</label>
          <input type="number" step="0.0001" name="factor" required placeholder="e.g. 10"
                 class="mt-1 block w-full px-3 py-2 text-sm md:text-base border rounded-lg focus:ring-2 focus:ring-pink-400 focus:border-pink-400">
          <p class="text-xs md:text-sm text-gray-500 mt-1">
            This means: 1 <strong>From Unit</strong> = X <strong>To Unit</strong>
          </p>
        </div>
      </div>

      <!-- Submit Button -->
      <div class="pt-4 flex justify-center md:justify-end">
        <button type="submit"
                class="px-5 md:px-6 py-2 md:py-2.5 bg-pink-600 text-white text-sm md:text-base font-medium rounded-lg hover:bg-pink-700 transition shadow-md">
          Save Conversion
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
