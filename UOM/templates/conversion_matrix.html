{% extends 'adminbase.html' %}

{% block content %}
<div class="max-w-4xl mx-auto bg-white p-8 rounded-lg shadow">
  <h2 class="text-2xl font-bold text-pink-700 mb-6">Add UOM Conversion</h2>

  <form action="{% url 'UOM:conversion_register' %}" method="POST" class="space-y-6">
    {% csrf_token %}

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- From UOM -->
      <div>
        <label class="block text-sm font-medium text-gray-700">From Unit</label>
        <select name="from_uom" required
                class="mt-1 block w-full px-4 py-2 border rounded-md bg-white focus:ring-2 focus:ring-pink-400">
          <option value="">-- Select UOM --</option>
          {% for u in uoms %}
            <option value="{{ u.id }}">{{ u.name }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- To UOM -->
      <div>
        <label class="block text-sm font-medium text-gray-700">To Unit</label>
        <select name="to_uom" required
                class="mt-1 block w-full px-4 py-2 border rounded-md bg-white focus:ring-2 focus:ring-pink-400">
          <option value="">-- Select UOM --</option>
          {% for u in uoms %}
            <option value="{{ u.id }}">{{ u.name }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Conversion Factor -->
      <div class="md:col-span-2">
        <label class="block text-sm font-medium text-gray-700">Conversion Factor</label>
        <input type="number" step="0.0001" name="factor" required placeholder="e.g. 10"
               class="mt-1 block w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-pink-400">
        <p class="text-sm text-gray-500 mt-1">This means: 1 <strong>From Unit</strong> = X <strong>To Unit</strong></p>
      </div>
    </div>

    <!-- Submit Button -->
    <div class="pt-4">
      <button type="submit"
              class="px-6 py-2 bg-pink-600 text-white rounded-md hover:bg-pink-700 transition shadow">
        Save Conversion
      </button>
    </div>
  </form>
</div>
{% endblock %}
