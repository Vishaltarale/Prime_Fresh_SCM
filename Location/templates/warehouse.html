{% extends 'adminbase.html' %}

{% block content %}
<div class="max-w-3xl mx-auto bg-white p-8 rounded-lg shadow">
  <h2 class="text-2xl font-bold text-green-700 mb-6">Register Warehouse</h2>

  <form action="{% url 'Location:warehouse_register' %}" method="POST" class="space-y-6">
    {% csrf_token %}

    <!-- Warehouse Name -->
    <div>
      <label class="block text-sm font-medium text-gray-700">Warehouse Name</label>
      <input type="text" name="warehouse_name" required placeholder="e.g., Nagpur Central Storage"
             class="mt-1 block w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-green-400">
    </div>

    <!-- Address -->
    <div>
      <label class="block text-sm font-medium text-gray-700">Address</label>
      <textarea name="address" rows="3" required placeholder="Full address"
                class="mt-1 block w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-green-400"></textarea>
    </div>

    <!-- City -->
    <div>
      <label class="block text-sm font-medium text-gray-700">City</label>
      <input type="text" name="city" required placeholder="e.g., Nagpur"
             class="mt-1 block w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-green-400">
    </div>

    <!-- State -->
    <div>
      <label class="block text-sm font-medium text-gray-700">State</label>
      <input type="text" name="state" required placeholder="e.g., Maharashtra"
             class="mt-1 block w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-green-400">
    </div>

    <!-- Pincode -->
    <div>
      <label class="block text-sm font-medium text-gray-700">Pincode</label>
      <input type="text" name="pincode" required placeholder="e.g., 440001"
             class="mt-1 block w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-green-400">
    </div>

    <!-- Submit Button -->
    <div class="pt-4">
      <button type="submit"
              class="px-6 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 transition shadow">
        Save Warehouse
      </button>
    </div>
  </form>
</div>
{% endblock %}
