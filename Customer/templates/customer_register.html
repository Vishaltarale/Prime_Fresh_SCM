{% extends "base.html" %}
{% block content %}

<!-- Content section with padding to avoid navbar/sidebar overlap -->
<section class="p-2 md:ml-[260px] mt-[0px] flex justify-center">

  <div class="bg-white shadow-md rounded-lg p-8 w-full max-w-xl">
    <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Customer Registration</h2>
    
    <form method="POST" action="{% url "Customer:Customer_save" %}" class="space-y-5">
      {% csrf_token %}

      <!-- First and Last Name -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-gray-700 font-medium mb-1">First Name</label>
          <input type="text" name="first_name" required class="w-full border border-gray-300 rounded-md px-4 py-2 focus:ring focus:ring-blue-300">
        </div>
        <div>
          <label class="block text-gray-700 font-medium mb-1">Last Name</label>
          <input type="text" name="last_name" required class="w-full border border-gray-300 rounded-md px-4 py-2 focus:ring focus:ring-blue-300">
        </div>
      </div>

      <!-- Email -->
      <div>
        <label class="block text-gray-700 font-medium mb-1">Email</label>
        <input type="email" name="email" required class="w-full border border-gray-300 rounded-md px-4 py-2 focus:ring focus:ring-blue-300">
      </div>

      <!-- Company Name -->
      <div>
        <label class="block text-gray-700 font-medium mb-1">Company Name</label>
        <input type="text" name="company_name" class="w-full border border-gray-300 rounded-md px-4 py-2 focus:ring focus:ring-blue-300">
      </div>

      <!-- Phone Number -->
      <div>
        <label class="block text-gray-700 font-medium mb-1">Phone Number</label>
        <input type="text" name="phone_number" class="w-full border border-gray-300 rounded-md px-4 py-2 focus:ring focus:ring-blue-300">
      </div>

      <!-- Address -->
      <div>
        <label class="block text-gray-700 font-medium mb-1">Address</label>
        <textarea name="address" rows="3" class="w-full border border-gray-300 rounded-md px-4 py-2 focus:ring focus:ring-blue-300"></textarea>
      </div>

      <!-- Password -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-gray-700 font-medium mb-1">Password</label>
          <input type="password" name="password1" required class="w-full border border-gray-300 rounded-md px-4 py-2 focus:ring focus:ring-blue-300">
        </div>
        <div>
          <label class="block text-gray-700 font-medium mb-1">Confirm Password</label>
          <input type="password" name="password2" required class="w-full border border-gray-300 rounded-md px-4 py-2 focus:ring focus:ring-blue-300">
        </div>
      </div>

      <!-- Submit Button -->
      <div>
        <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-md hover:bg-blue-700 transition duration-200">
          Register
        </button>
      </div>
    </form>
  </div>

</section>
{% endblock content %}
