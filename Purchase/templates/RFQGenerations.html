{% extends 'base.html' %}
{% block content %}
<div class="max-w-5xl mx-auto bg-white p-4 md:p-6 lg:p-8 rounded-lg shadow-lg mt-4 md:mt-8 mb-8">
    <h2 class="text-xl md:text-2xl font-bold text-indigo-700 mb-4 md:mb-6">Request For Quotation</h2>

    <!-- Display Messages -->
    {% if messages %}
    <div class="mb-6">
        {% for message in messages %}
        <div class="p-4 rounded-lg {% if message.tags == 'error' %}bg-red-100 text-red-700 border border-red-300{% else %}bg-green-100 text-green-700 border border-green-300{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <form id="rfqForm" method="POST" class="space-y-6">
        {% csrf_token %}
        
        <!-- Warehouse Selection -->
        <div class="bg-gray-50 p-4 md:p-6 rounded-lg">
            <label class="block text-sm font-medium text-gray-700 mb-2">Warehouse *</label>
            <select name="warehouse" required
                    class="w-full px-3 md:px-4 py-2 md:py-3 border border-gray-300 rounded-lg bg-white focus:ring-2 focus:ring-indigo-400 text-sm md:text-base">
                <option value="">-- Select Warehouse --</option>
                {% for warehouse in warehouses %}
                    <option value="{{ warehouse.id }}">{{ warehouse.warehouse_name }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Source Type Selection -->
        <div class="bg-gray-50 p-4 md:p-6 rounded-lg">
            <label class="block text-sm font-medium text-gray-700 mb-3">Add From *</label>
            <div class="flex flex-col sm:flex-row gap-3 md:gap-6">
                <label class="inline-flex items-center p-3 bg-white rounded-lg border border-gray-200 cursor-pointer hover:bg-gray-50 transition-colors flex-1">
                    <input type="radio" name="source_type" value="supplier" required
                           class="form-radio text-indigo-600 h-4 w-4">
                    <span class="ml-3 text-gray-700 font-medium">Supplier</span>
                </label>
                <label class="inline-flex items-center p-3 bg-white rounded-lg border border-gray-200 cursor-pointer hover:bg-gray-50 transition-colors flex-1">
                    <input type="radio" name="source_type" value="farmer"
                           class="form-radio text-indigo-600 h-4 w-4">
                    <span class="ml-3 text-gray-700 font-medium">Farmer</span>
                </label>
            </div>
        </div>

        <!-- Supplier Dropdown -->
        <div id="supplierSection" class="hidden bg-gray-50 p-4 md:p-6 rounded-lg">
            <label class="block text-sm font-medium text-gray-700 mb-2">Select Supplier *</label>
            <select name="supplier_id" class="w-full px-3 md:px-4 py-2 md:py-3 border border-gray-300 rounded-lg bg-white text-sm md:text-base">
                <option value="">-- Choose Supplier --</option>
                {% for s in suppliers %}
                    <option value="{{ s.id }}">{{ s.supplier_name }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Farmer Dropdown -->
        <div id="farmerSection" class="hidden bg-gray-50 p-4 md:p-6 rounded-lg">
            <label class="block text-sm font-medium text-gray-700 mb-2">Select Farmer *</label>
            <select name="farmer_id" class="w-full px-3 md:px-4 py-2 md:py-3 border border-gray-300 rounded-lg bg-white text-sm md:text-base">
                <option value="">-- Choose Farmer --</option>
                {% for f in farmers %}
                    <option value="{{ f.id }}">{{ f.full_name }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Purchase Items Section -->
        <div class="bg-gray-50 p-4 md:p-6 rounded-lg">
            <div class="flex justify-between items-center mb-4">
                <label class="block text-gray-700 font-medium text-sm md:text-base">Purchase Items</label>
                <button type="button" id="addProductBtn"
                        class="bg-green-600 text-white py-2 px-3 md:px-4 rounded hover:bg-green-700 text-xs md:text-sm flex items-center gap-1">
                    <i class="fas fa-plus"></i>
                    Add Product
                </button>
            </div>

            <!-- Items Container -->
            <div id="itemsContainer" class="space-y-4">
                <!-- Initial Product Row -->
                <div class="product-row bg-white border border-gray-200 rounded-lg p-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-6 gap-4">
                        <!-- Product Selection -->
                        <div class="lg:col-span-2">
                            <label class="block text-xs text-gray-500 mb-1">Product *</label>
                            <select name="product_id[]" class="product-select w-full border border-gray-300 rounded-md px-3 py-2 text-sm" required>
                                <option value="">Select Product</option>
                                {% for product in products %}
                                    <option value="{{ product.id }}" 
                                            data-name="{{ product.name }}"
                                            data-sku="{{ product.sku }}" 
                                            data-category="{{ product.category.id }}"
                                            data-category-name="{{ product.category.name }}">
                                        {{ product.name }}
                                    </option>
                                {% endfor %}
                            </select>
                            <input type="hidden" name="product_name[]" class="product-name-field">
                        </div>
                        
                        <!-- SKU -->
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">SKU</label>
                            <input type="text" name="sku[]" readonly
                                   class="sku-field w-full border border-gray-300 rounded-md px-3 py-2 bg-gray-100 text-sm">
                        </div>
                        
                        <!-- Category -->
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">Category</label>
                            <input type="text" name="category_name[]" readonly
                                   class="category-field w-full border border-gray-300 rounded-md px-3 py-2 bg-gray-100 text-sm">
                            <input type="hidden" name="category_id[]" class="category-id-field">
                        </div>
                        
                        <!-- Quantity -->
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">Quantity *</label>
                            <input type="number" name="quantity[]" min="1" step="1" required
                                   class="quantity-field w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
                        </div>
                        
                        <!-- Price -->
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">Price (₹) *</label>
                            <input type="number" name="price[]" min="0" step="0.01" required
                                   class="price-field w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
                        </div>
                        
                        <!-- Actions -->
                        <div class="flex items-end">
                            <button type="button" class="remove-row-btn text-red-500 hover:text-red-700 text-sm flex items-center gap-1">
                                <i class="fas fa-trash"></i>
                                Remove
                            </button>
                        </div>
                    </div>
                    
                    <!-- Subcategory and UOM (Full width on mobile) -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                        <!-- Subcategory -->
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">Subcategory *</label>
                            <select name="subcategory_id[]" required
                                    class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
                                <option value="">Select Subcategory</option>
                                {% for sub in subcategories %}
                                    <option value="{{ sub.id }}">{{ sub.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <!-- UOM -->
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">UOM *</label>
                            <select name="uom[]" required
                                    class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
                                <option value="" disabled selected>Select UOM</option>
                                {% for item in uoms %}
                                    <option value="{{ item }}">{{ item }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    
                    <!-- Amount -->
                    <div class="mt-4 pt-4 border-t border-gray-200">
                        <div class="flex justify-between items-center">
                            <span class="text-sm font-medium text-gray-700">Line Total:</span>
                            <span class="line-total text-lg font-semibold text-indigo-700">₹0.00</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Total Amount -->
        <div class="bg-indigo-50 p-4 md:p-6 rounded-lg border border-indigo-100">
            <div class="flex justify-between items-center">
                <label class="block text-gray-700 font-medium text-sm md:text-base">Total Amount:</label>
                <p id="totalAmount" class="text-xl md:text-2xl font-semibold text-indigo-700">₹0.00</p>
            </div>
        </div>

        <!-- Submit Button -->
        <div class="flex justify-end pt-4">
            <button type="submit" id="submitBtn"
                    class="w-full md:w-auto px-6 py-3 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition shadow text-sm md:text-base font-medium flex items-center justify-center gap-2">
                <i class="fas fa-check"></i>
                Save RFQ
            </button>
        </div>
    </form>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Toggle between Supplier and Farmer sections
        const sourceTypeRadios = document.querySelectorAll('input[name="source_type"]');
        const supplierSection = document.getElementById('supplierSection');
        const farmerSection = document.getElementById('farmerSection');
        
        sourceTypeRadios.forEach(radio => {
            radio.addEventListener('change', function() {
                if (this.value === 'supplier') {
                    supplierSection.classList.remove('hidden');
                    farmerSection.classList.add('hidden');
                    // Make supplier required, farmer not required
                    document.querySelector('select[name="supplier_id"]').required = true;
                    document.querySelector('select[name="farmer_id"]').required = false;
                } else if (this.value === 'farmer') {
                    farmerSection.classList.remove('hidden');
                    supplierSection.classList.add('hidden');
                    // Make farmer required, supplier not required
                    document.querySelector('select[name="farmer_id"]').required = true;
                    document.querySelector('select[name="supplier_id"]').required = false;
                }
            });
        });

        // Add product row
        document.getElementById('addProductBtn').addEventListener('click', function() {
            const itemsContainer = document.getElementById('itemsContainer');
            const newRow = document.createElement('div');
            newRow.className = 'product-row bg-white border border-gray-200 rounded-lg p-4';
            newRow.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-6 gap-4">
                    <!-- Product Selection -->
                    <div class="lg:col-span-2">
                        <label class="block text-xs text-gray-500 mb-1">Product *</label>
                        <select name="product_id[]" class="product-select w-full border border-gray-300 rounded-md px-3 py-2 text-sm" required>
                            <option value="">Select Product</option>
                            {% for product in products %}
                                <option value="{{ product.id }}" 
                                        data-name="{{ product.name }}"
                                        data-sku="{{ product.sku }}" 
                                        data-category="{{ product.category.id }}"
                                        data-category-name="{{ product.category.name }}">
                                    {{ product.name }}
                                </option>
                            {% endfor %}
                        </select>
                        <input type="hidden" name="product_name[]" class="product-name-field">
                    </div>
                    
                    <!-- SKU -->
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">SKU</label>
                        <input type="text" name="sku[]" readonly
                               class="sku-field w-full border border-gray-300 rounded-md px-3 py-2 bg-gray-100 text-sm">
                    </div>
                    
                    <!-- Category -->
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">Category</label>
                        <input type="text" name="category_name[]" readonly
                               class="category-field w-full border border-gray-300 rounded-md px-3 py-2 bg-gray-100 text-sm">
                        <input type="hidden" name="category_id[]" class="category-id-field">
                    </div>
                    
                    <!-- Quantity -->
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">Quantity *</label>
                        <input type="number" name="quantity[]" min="1" step="1" required
                               class="quantity-field w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
                    </div>
                    
                    <!-- Price -->
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">Price (₹) *</label>
                        <input type="number" name="price[]" min="0" step="0.01" required
                               class="price-field w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
                    </div>
                    
                    <!-- Actions -->
                    <div class="flex items-end">
                        <button type="button" class="remove-row-btn text-red-500 hover:text-red-700 text-sm flex items-center gap-1">
                            <i class="fas fa-trash"></i>
                            Remove
                        </button>
                    </div>
                </div>
                
                <!-- Subcategory and UOM (Full width on mobile) -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                    <!-- Subcategory -->
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">Subcategory *</label>
                        <select name="subcategory_id[]" required
                                class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
                            <option value="">Select Subcategory</option>
                            {% for sub in subcategories %}
                                <option value="{{ sub.id }}">{{ sub.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <!-- UOM -->
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">UOM *</label>
                        <select name="uom[]" required
                                class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
                            <option value="" disabled selected>Select UOM</option>
                            {% for item in uoms %}
                                <option value="{{ item }}">{{ item }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                
                <!-- Amount -->
                <div class="mt-4 pt-4 border-t border-gray-200">
                    <div class="flex justify-between items-center">
                        <span class="text-sm font-medium text-gray-700">Line Total:</span>
                        <span class="line-total text-lg font-semibold text-indigo-700">₹0.00</span>
                    </div>
                </div>
            `;
            
            itemsContainer.appendChild(newRow);
            
            // Add event listeners to the new row
            addRowEventListeners(newRow);
        });

        // Add event listeners to initial row
        document.querySelectorAll('.product-row').forEach(row => {
            addRowEventListeners(row);
        });

        // Function to add event listeners to a product row
        function addRowEventListeners(row) {
            // Product selection change
            const productSelect = row.querySelector('.product-select');
            productSelect.addEventListener('change', function() {
                const selectedOption = this.options[this.selectedIndex];
                if (selectedOption.value) {
                    const productNameField = row.querySelector('.product-name-field');
                    const skuField = row.querySelector('.sku-field');
                    const categoryField = row.querySelector('.category-field');
                    const categoryIdField = row.querySelector('.category-id-field');
                    
                    productNameField.value = selectedOption.dataset.name;
                    skuField.value = selectedOption.dataset.sku;
                    categoryField.value = selectedOption.dataset.categoryName;
                    categoryIdField.value = selectedOption.dataset.category;
                } else {
                    row.querySelector('.product-name-field').value = '';
                    row.querySelector('.sku-field').value = '';
                    row.querySelector('.category-field').value = '';
                    row.querySelector('.category-id-field').value = '';
                }
            });
            
            // Quantity and price change for calculation
            const quantityField = row.querySelector('.quantity-field');
            const priceField = row.querySelector('.price-field');
            const lineTotal = row.querySelector('.line-total');
            
            function calculateLineTotal() {
                const quantity = parseFloat(quantityField.value) || 0;
                const price = parseFloat(priceField.value) || 0;
                const total = quantity * price;
                lineTotal.textContent = `₹${total.toFixed(2)}`;
                calculateGrandTotal();
            }
            
            quantityField.addEventListener('input', calculateLineTotal);
            priceField.addEventListener('input', calculateLineTotal);
            
            // Remove row button
            const removeBtn = row.querySelector('.remove-row-btn');
            removeBtn.addEventListener('click', function() {
                if (document.querySelectorAll('.product-row').length > 1) {
                    row.remove();
                    calculateGrandTotal();
                } else {
                    alert('At least one product is required');
                }
            });
        }

        // Calculate grand total
        function calculateGrandTotal() {
            let total = 0;
            document.querySelectorAll('.product-row').forEach(row => {
                const quantity = parseFloat(row.querySelector('.quantity-field').value) || 0;
                const price = parseFloat(row.querySelector('.price-field').value) || 0;
                total += quantity * price;
            });
            document.getElementById('totalAmount').textContent = `₹${total.toFixed(2)}`;
        }

        // Form validation and submission
        document.getElementById('rfqForm').addEventListener('submit', function(e) {
            // Basic validation
            const warehouse = document.querySelector('select[name="warehouse"]');
            if (!warehouse.value) {
                e.preventDefault();
                alert('Please select a warehouse');
                warehouse.focus();
                return false;
            }
            
            const sourceType = document.querySelector('input[name="source_type"]:checked');
            if (!sourceType) {
                e.preventDefault();
                alert('Please select Supplier or Farmer');
                return false;
            }
            
            if (sourceType.value === 'supplier') {
                const supplier = document.querySelector('select[name="supplier_id"]');
                if (!supplier.value) {
                    e.preventDefault();
                    alert('Please select a supplier');
                    supplier.focus();
                    return false;
                }
            } else if (sourceType.value === 'farmer') {
                const farmer = document.querySelector('select[name="farmer_id"]');
                if (!farmer.value) {
                    e.preventDefault();
                    alert('Please select a farmer');
                    farmer.focus();
                    return false;
                }
            }
            
            // Validate product rows
            const productRows = document.querySelectorAll('.product-row');
            let hasValidProduct = false;
            
            for (let i = 0; i < productRows.length; i++) {
                const row = productRows[i];
                const productSelect = row.querySelector('.product-select');
                const quantity = row.querySelector('.quantity-field');
                const price = row.querySelector('.price-field');
                const subcategory = row.querySelector('select[name="subcategory_id[]"]');
                const uom = row.querySelector('select[name="uom[]"]');
                
                if (productSelect.value && quantity.value && price.value && 
                    subcategory.value && uom.value) {
                    hasValidProduct = true;
                    
                    // Validate numeric values
                    if (parseFloat(quantity.value) <= 0) {
                        e.preventDefault();
                        alert('Quantity must be greater than 0');
                        quantity.focus();
                        return false;
                    }
                    
                    if (parseFloat(price.value) < 0) {
                        e.preventDefault();
                        alert('Price cannot be negative');
                        price.focus();
                        return false;
                    }
                }
            }
            
            if (!hasValidProduct) {
                e.preventDefault();
                alert('Please fill in all required fields for at least one product');
                return false;
            }
            
            // If all validations pass, form will submit normally
            console.log('RFQ form submitted successfully');
        });
    });
</script>

<style>
    /* Custom styles for better mobile experience */
    @media (max-width: 768px) {
        .form-radio {
            transform: scale(1.1);
        }
    }

    /* Smooth transitions for interactive elements */
    .transition-colors {
        transition: all 0.2s ease-in-out;
    }

    /* Focus styles for better accessibility */
    input:focus, select:focus, textarea:focus {
        outline: none;
        ring: 2px;
        border-color: #4f46e5;
    }

    /* Custom styling for product rows */
    .product-row {
        transition: all 0.3s ease;
    }

    .product-row:hover {
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }
</style>
{% endblock %}
