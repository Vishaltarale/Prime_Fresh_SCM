{% extends 'adminbase.html' %}

{% block content %}
<div class="max-w-3xl mx-auto bg-white p-8 rounded-lg shadow">
  <h2 class="text-2xl font-bold text-teal-700 mb-6">Add Subcategory</h2>

  <form action="{% url 'product_Items:subcategory_register' %}" method="POST" class="space-y-6">
    {% csrf_token %}

    <!-- Subcategory Name -->
    <div>
      <label class="block text-sm font-medium text-gray-700">Subcategory Name</label>
      <input type="text" name="name" required
             class="mt-1 block w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-teal-400">
    </div>

    <!-- Category Selection -->
    <div>
      <label class="block text-sm font-medium text-gray-700">Select Category</label>
      <select name="category" required
              class="mt-1 block w-full px-4 py-2 border rounded-md bg-white focus:ring-2 focus:ring-teal-400">
        <option value="">-- Choose Category --</option>
        {% for category in categories %}
          <option value="{{ category.id }}">{{ category.name }}</option>
        {% endfor %}
      </select>
    </div>

    <!-- Submit Button -->
    <div class="pt-4">
      <button type="submit"
              class="px-6 py-2 bg-teal-600 text-white rounded-md hover:bg-teal-700 transition shadow">
        Save Subcategory
      </button>
    </div>
  </form>
</div>
{% endblock %}
