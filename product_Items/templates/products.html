{% extends 'base.html' %}

{% block content %}
<div class="md:ml-[240px] mt-6 flex justify-center">
  <!-- Card Container -->
  <div class="w-full max-w-4xl bg-white shadow-lg rounded-xl p-6 md:p-8">
    
    <!-- Title -->
    <h2 class="text-xl md:text-2xl font-bold text-indigo-700 mb-6 text-center md:text-left">
      Add New Product
    </h2>

    <!-- Form -->
    <form action="{% url 'product_Items:product_register' %}" method="POST" class="space-y-6">
      {% csrf_token %}

      <!-- Grid Layout -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <!-- Product Name -->
        <div>
          <label class="block text-sm md:text-base font-medium text-gray-700">Product Name</label>
          <input type="text" name="name" required
                 class="mt-1 block w-full px-3 py-2 text-sm md:text-base border rounded-lg focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400">
        </div>

        <!-- Category -->
        <div>
          <label class="block text-sm md:text-base font-medium text-gray-700">Category</label>
          <select name="category" required
                  class="mt-1 block w-full px-3 py-2 text-sm md:text-base border rounded-lg bg-white focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400">
            <option value="">Select category</option>
            {% for sub in categories %}
              <option value="{{ sub.id }}">{{ sub.name }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <!-- Submit Button -->
      <div class="pt-4 flex justify-center md:justify-start">
        <button type="submit"
                class="px-5 md:px-6 py-2 md:py-2.5 bg-indigo-600 text-white text-sm md:text-base font-medium rounded-lg hover:bg-indigo-700 transition shadow-md">
          Save Product
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
