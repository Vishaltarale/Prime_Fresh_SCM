{% extends 'adminbase.html' %}

{% block content %}
<div class="max-w-3xl mx-auto bg-white p-8 rounded-lg shadow">
  <h2 class="text-2xl font-bold text-emerald-700 mb-6">Add Product Category</h2>

  <form action="{% url 'product_Items:category_register' %}" method="POST" class="space-y-6">
    {% csrf_token %}

    <!-- Category Name -->
    <div>
      <label class="block text-sm font-medium text-gray-700">Category Name</label>
      <input type="text" name="name" required
             class="mt-1 block w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-emerald-400">
    </div>

    <!-- Description -->
    <div>
      <label class="block text-sm font-medium text-gray-700">Description</label>
      <textarea name="description" rows="3"
                class="mt-1 block w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-emerald-400"></textarea>
    </div>

    <!-- Submit Button -->
    <div class="pt-4">
      <button type="submit"
              class="px-6 py-2 bg-emerald-600 text-white rounded-md hover:bg-emerald-700 transition shadow">
        Save Category
      </button>
    </div>
  </form>
</div>
{% endblock %}
