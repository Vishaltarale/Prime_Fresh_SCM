{% extends "adminbase.html" %}
{% block content %}
<div class="flex min-h-screen">
  <!-- Sidebar is handled in base -->

  <!-- Main Content -->
  <main class="p-6 md:ml-[250px] mt-[10px] p-4 md:p-6 bg-gray-50">
    <div class="bg-white shadow-md rounded-lg p-6 max-w-5xl mx-auto">
      <h2 class="text-2xl font-semibold mb-6 text-gray-800 text-center"><b>Edit Order</b></h2>

      <form method="POST" action="{% url 'Orders:Order_update' %}?id={{ order.id }}" id="orderForm">
        {% csrf_token %}

        <!-- Customer Name -->
        <div class="mb-4">
          <label class="block text-gray-700 font-medium mb-1">Customer Name</label>
          <select name="customer_name" required
            class="w-full border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:ring focus:ring-blue-300">
            <option value="" disabled>Select a customer</option>
            {% for customer in Customers %}
              <option value="{{ customer.full_name }}"
                {% if order.customer_name == customer.full_name %}selected{% endif %}>{{ customer.full_name }}</option>
            {% endfor %}
          </select>
        </div>

        <!-- Delivery Address -->
        <div class="mb-4">
          <label class="block text-gray-700 font-medium mb-1">Delivery Address</label>
          <textarea name="delivery_address" rows="3" required
            class="w-full border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:ring focus:ring-blue-300">{{ order.delivery_address }}</textarea>
        </div>

        <!-- Order Status -->
        <div class="mb-4">
          <label class="block text-gray-700 font-medium mb-1">Order Status</label>
          <select name="status" required
            class="w-full border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:ring focus:ring-blue-300">
            {% for s in status_choices %}
              <option value="{{ s }}" {% if order.status == s %}selected{% endif %}>{{ s }}</option>
            {% endfor %}
          </select>
        </div>

        <!-- Payment Status -->
        <div class="mb-4">
          <label class="block text-gray-700 font-medium mb-1">Payment Status</label>
          <select name="payment_status" required
            class="w-full border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:ring focus:ring-blue-300">
            {% for p in payment_choices %}
              <option value="{{ p }}" {% if order.payment_status == p %}selected{% endif %}>{{ p }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="mb-4">
            <label class="block text-gray-700 font-medium mb-1">From Warehouse ?</label>
            <select name="warehouse_id" required 
            class="w-full border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:ring focus:ring-blue-300">
">
             <option value="" disabled selected>Select Warehouse</option>
              {% for w in warehouses %}
                <option value="{{ w.id }}" {% if order.warehouse.id == w.id %}selected{% endif %}>{{ w.warehouse_name }}</option>
              {% endfor %}
            </select>
        </div>

        <!-- Order Items -->
        <div class="mb-4">
          <label class="block text-gray-700 font-medium mb-2">Order Items</label>
          <div id="itemsContainer" class="space-y-4">
            {% for item in order.items %}
            <div class="flex flex-wrap gap-3 item-row">
              <select name="product_name[]" required
                class="w-full md:w-1/3 border border-gray-300 rounded-md px-3 py-2">
                <option value="" disabled>Select Product</option>
                {% for i in products %}
                  <option value="{{ i.name }}" {% if i.name == item.product_name %}selected{% endif %}>{{ i.name }}</option>
                {% endfor %}
              </select>

              <input type="number" name="quantity[]" value="{{ item.quantity }}" placeholder="Qty" min="1" required
                class="w-[15%] border border-gray-300 rounded-md px-3 py-2">

              <select name="uom[]" required
                class="w-[15%] border border-gray-300 rounded-md px-3 py-2">
                <option value="" disabled>Select UOM</option>
                {% for unit in uoms %}
                  <option value="{{ unit.name }}" {% if unit.name == item.uom %}selected{% endif %}>{{ unit.name }}</option>
                {% endfor %}
              </select>

              <input type="number" name="price[]" value="{{ item.price }}" placeholder="Price" step="0.01" min="0" required
                class="w-[20%] border border-gray-300 rounded-md px-3 py-2">

              <button type="button" onclick="removeRow(this)"
                class="text-red-500 hover:text-red-700 font-medium text-sm self-center">Remove</button>
            </div>
            {% endfor %}
          </div>

          <!-- Add Product Button -->
          <button type="button" onclick="addProductRow()"
            class="mt-4 bg-green-600 text-white py-2 px-4 rounded hover:bg-green-700 text-sm">+ Add Another Product</button>
        </div>

        <!-- Total -->
        <div class="mt-6 text-right">
          <label class="block text-gray-700 font-medium mb-1">Total Amount:</label>
          <p id="totalAmount" class="text-xl font-semibold text-gray-800">₹{{ order.total_amount }}</p>
        </div>

        <!-- Submit -->
        <div class="mt-6">
          <button type="submit"
            class="w-full bg-blue-600 text-white py-3 rounded-md hover:bg-blue-700 transition duration-200">Update Order</button>
        </div>
      </form>
    </div>
  </main>
</div>

<script>
  function addProductRow() {
    const container = document.getElementById('itemsContainer');
    const row = document.createElement('div');
    row.className = 'flex flex-wrap gap-3 item-row';
    row.innerHTML = `
      <select name="product_name[]" required class="w-full md:w-1/3 border border-gray-300 rounded-md px-3 py-2">
        <option value="" disabled selected>Select Product</option>
        {% for i in products %}
          <option value="{{ i.name }}">{{ i.name }}</option>
        {% endfor %}
      </select>
      <input type="number" name="quantity[]" placeholder="Qty" min="1" required class="w-[15%] border border-gray-300 rounded-md px-3 py-2">
      <select name="uom[]" required class="w-[15%] border border-gray-300 rounded-md px-3 py-2">
        <option value="" disabled selected>Select UOM</option>
        {% for unit in uoms %}
          <option value="{{ unit.name }}">{{ unit.name }}</option>
        {% endfor %}
      </select>
      <input type="number" name="price[]" placeholder="Price" step="0.01" min="0" required class="w-[20%] border border-gray-300 rounded-md px-3 py-2">
      <button type="button" onclick="removeRow(this)" class="text-red-500 hover:text-red-700 font-medium text-sm self-center">Remove</button>
    `;
    container.appendChild(row);
    calculateTotal();
  }

  function removeRow(button) {
    button.closest('.item-row').remove();
    calculateTotal();
  }

  function calculateTotal() {
    const prices = document.querySelectorAll('input[name="price[]"]');
    const quantities = document.querySelectorAll('input[name="quantity[]"]');
    let total = 0;
    prices.forEach((price, index) => {
      const qty = parseFloat(quantities[index].value) || 0;
      const cost = parseFloat(price.value) || 0;
      total += qty * cost;
    });
    document.getElementById('totalAmount').textContent = `₹${total.toFixed(2)}`;
  }

  document.addEventListener('DOMContentLoaded', calculateTotal);
  document.getElementById('orderForm').addEventListener('input', calculateTotal);
</script>
{% endblock %}
