<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Registration | SCM System</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    
    .fade-in-up {
      animation: fadeInUp 0.8s ease-out;
    }
    
    .float-animation {
      animation: float 6s ease-in-out infinite;
    }
    
    .glass-effect {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-indigo-50 to-purple-100 min-h-screen flex items-center justify-center font-sans p-4">
  <!-- Background Elements -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
    <div class="absolute -top-40 -right-40 w-80 h-80 bg-blue-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 float-animation"></div>
    <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-purple-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 float-animation" style="animation-delay: 2s;"></div>
    <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-80 h-80 bg-indigo-200 rounded-full mix-blend-multiply filter blur-3xl opacity-20 float-animation" style="animation-delay: 4s;"></div>
  </div>

  <div class="w-full max-w-md bg-white/90 backdrop-blur-lg rounded-2xl shadow-2xl overflow-hidden border border-white/50 fade-in-up relative z-10">
    <!-- Header Section -->
    <div class="bg-gradient-to-r from-indigo-600 to-purple-600 p-6 text-center text-white">
      <div class="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4">
        <i class="fas fa-user-plus text-2xl"></i>
      </div>
      <h2 class="text-2xl font-bold">Create Account</h2>
      <p class="text-indigo-100 text-sm mt-1">Join our SCM system today</p>
    </div>

    <div class="p-6 sm:p-8">
      <form method="POST" action="" class="space-y-5">
        {% csrf_token %}

        <!-- Full Name -->
        <div class="relative group">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i class="fas fa-user text-gray-400 group-focus-within:text-indigo-600 transition-colors"></i>
          </div>
          <input type="text" name="full_name" id="full_name" required
                 class="pl-10 pr-4 w-full pt-5 pb-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition duration-200 placeholder-transparent"
                 placeholder="Full Name" />
          <label for="full_name"
                 class="absolute left-10 top-2 text-sm text-gray-500 transition-all 
                        peer-placeholder-shown:top-3.5 peer-placeholder-shown:text-base peer-placeholder-shown:text-gray-400
                        peer-focus:top-2 peer-focus:text-sm peer-focus:text-indigo-600">
            Full Name
          </label>
        </div>

        <!-- Email -->
        <div class="relative group">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i class="fas fa-envelope text-gray-400 group-focus-within:text-indigo-600 transition-colors"></i>
          </div>
          <input type="email" name="email" id="email" required
                 class="pl-10 pr-4 w-full pt-5 pb-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition duration-200 placeholder-transparent"
                 placeholder="Email" />
          <label for="email"
                 class="absolute left-10 top-2 text-sm text-gray-500 transition-all 
                        peer-placeholder-shown:top-3.5 peer-placeholder-shown:text-base peer-placeholder-shown:text-gray-400
                        peer-focus:top-2 peer-focus:text-sm peer-focus:text-indigo-600">
            Email Address
          </label>
        </div>

        <!-- Phone -->
        <div class="relative group">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i class="fas fa-phone text-gray-400 group-focus-within:text-indigo-600 transition-colors"></i>
          </div>
          <input type="tel" name="phone" id="phone" required
                 class="pl-10 pr-4 w-full pt-5 pb-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition duration-200 placeholder-transparent"
                 placeholder="Phone Number" />
          <label for="phone"
                 class="absolute left-10 top-2 text-sm text-gray-500 transition-all 
                        peer-placeholder-shown:top-3.5 peer-placeholder-shown:text-base peer-placeholder-shown:text-gray-400
                        peer-focus:top-2 peer-focus:text-sm peer-focus:text-indigo-600">
            Phone Number
          </label>
        </div>

        <!-- Role Selection -->
        <div class="relative group">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i class="fas fa-user-tag text-gray-400 group-focus-within:text-indigo-600 transition-colors"></i>
          </div>
          <select name="user_role" required 
                  class="pl-10 pr-4 w-full pt-5 pb-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition duration-200 appearance-none bg-white">
            <option value="" disabled selected>Select Role</option>
            <option value='Customer'>Customer</option> 
            <option value='Admin'>Admin</option> 
            <option value='Inventory_Manager'>Inventory Manager</option>
            <option value='Purchase_Manager'>Purchase Manager</option>
            <option value='Sales_Manager'>Sales Manager</option>
            <option value='Warehouse_Manager'>Warehouse Manager</option>
            <option value='Accountant'>Accountant</option> 
          </select>
          <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none">
            <i class="fas fa-chevron-down text-gray-400"></i>
          </div>
          <label class="absolute left-10 top-2 text-sm text-gray-500 transition-all">
            User Role
          </label>
        </div>

        <!-- Password -->
        <div class="relative group">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i class="fas fa-lock text-gray-400 group-focus-within:text-indigo-600 transition-colors"></i>
          </div>
          <input type="password" name="password1" id="password1" required
                 class="pl-10 pr-10 w-full pt-5 pb-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition duration-200 placeholder-transparent"
                 placeholder="Password" />
          <button type="button" class="absolute inset-y-0 right-0 pr-3 flex items-center" onclick="togglePassword('password1', 'eye-icon-1')">
            <i id="eye-icon-1" class="fas fa-eye text-gray-400 hover:text-indigo-600 transition-colors"></i>
          </button>
          <label for="password1"
                 class="absolute left-10 top-2 text-sm text-gray-500 transition-all 
                        peer-placeholder-shown:top-3.5 peer-placeholder-shown:text-base peer-placeholder-shown:text-gray-400
                        peer-focus:top-2 peer-focus:text-sm peer-focus:text-indigo-600">
            Password
          </label>
        </div>

        <!-- Confirm Password -->
        <div class="relative group">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i class="fas fa-lock text-gray-400 group-focus-within:text-indigo-600 transition-colors"></i>
          </div>
          <input type="password" name="password2" id="password2" required
                 class="pl-10 pr-10 w-full pt-5 pb-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition duration-200 placeholder-transparent"
                 placeholder="Confirm Password" />
          <button type="button" class="absolute inset-y-0 right-0 pr-3 flex items-center" onclick="togglePassword('password2', 'eye-icon-2')">
            <i id="eye-icon-2" class="fas fa-eye text-gray-400 hover:text-indigo-600 transition-colors"></i>
          </button>
          <label for="password2"
                 class="absolute left-10 top-2 text-sm text-gray-500 transition-all 
                        peer-placeholder-shown:top-3.5 peer-placeholder-shown:text-base peer-placeholder-shown:text-gray-400
                        peer-focus:top-2 peer-focus:text-sm peer-focus:text-indigo-600">
            Confirm Password
          </label>
        </div>

        <!-- Terms and Conditions -->
        <div class="flex items-start space-x-2">
          <input type="checkbox" id="terms" name="terms" required
                 class="mt-1 rounded focus:ring-indigo-500 text-indigo-600">
          <label for="terms" class="text-sm text-gray-600">
            I agree to the <a href="#" class="text-indigo-600 hover:underline">Terms and Conditions</a> and <a href="#" class="text-indigo-600 hover:underline">Privacy Policy</a>
          </label>
        </div>

        <!-- Submit Button -->
        <div class="pt-2">
          <button type="submit"
                  class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-semibold py-3 rounded-lg transition-all duration-300 transform hover:scale-[1.02] shadow-lg hover:shadow-xl flex items-center justify-center gap-2">
            <i class="fas fa-user-plus"></i>
            Create Account
          </button>
        </div>
      </form>

      <!-- Divider -->
      <div class="flex items-center my-6">
        <div class="flex-1 border-t border-gray-300"></div>
        <div class="px-3 text-sm text-gray-500">Or</div>
        <div class="flex-1 border-t border-gray-300"></div>
      </div>

      <!-- Login Link -->
      <div class="text-center">
        <p class="text-sm text-gray-600">
          Already have an account?
          <a href="{% url 'Users:login_user' %}" class="text-indigo-600 hover:text-indigo-800 font-semibold transition-colors flex items-center justify-center gap-1 mt-1">
            <i class="fas fa-sign-in-alt"></i>
            Sign In Now
          </a>
        </p>
      </div>
    </div>
  </div>

  <script>
    // Toggle password visibility
    function togglePassword(passwordId, eyeIconId) {
      const passwordInput = document.getElementById(passwordId);
      const eyeIcon = document.getElementById(eyeIconId);
      
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        eyeIcon.classList.remove('fa-eye');
        eyeIcon.classList.add('fa-eye-slash');
      } else {
        passwordInput.type = 'password';
        eyeIcon.classList.remove('fa-eye-slash');
        eyeIcon.classList.add('fa-eye');
      }
    }

    // Add floating label functionality
    document.addEventListener('DOMContentLoaded', function() {
      const inputs = document.querySelectorAll('input[placeholder-transparent]');
      
      inputs.forEach(input => {
        // Check if input has value on page load (for browser autofill)
        if (input.value) {
          input.parentElement.querySelector('label').classList.add('top-2', 'text-sm');
          input.parentElement.querySelector('label').classList.remove('top-3.5', 'text-base');
        }
        
        input.addEventListener('focus', function() {
          this.parentElement.querySelector('label').classList.add('top-2', 'text-sm', 'text-indigo-600');
          this.parentElement.querySelector('label').classList.remove('top-3.5', 'text-base', 'text-gray-400');
        });
        
        input.addEventListener('blur', function() {
          if (!this.value) {
            this.parentElement.querySelector('label').classList.remove('top-2', 'text-sm', 'text-indigo-600');
            this.parentElement.querySelector('label').classList.add('top-3.5', 'text-base', 'text-gray-400');
          }
        });
      });

      // Add animation to form elements on load
      const formElements = document.querySelectorAll('.relative');
      formElements.forEach((el, index) => {
        el.style.animationDelay = `${index * 0.1}s`;
        el.classList.add('fade-in-up');
      });
    });

    // Form validation
    document.querySelector('form').addEventListener('submit', function(e) {
      const password1 = document.getElementById('password1').value;
      const password2 = document.getElementById('password2').value;
      const terms = document.getElementById('terms').checked;
      
      if (password1 !== password2) {
        e.preventDefault();
        alert('Passwords do not match. Please try again.');
        return false;
      }
      
      if (!terms) {
        e.preventDefault();
        alert('Please agree to the Terms and Conditions.');
        return false;
      }
    });
  </script>
</body>
</html>
