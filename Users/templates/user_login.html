<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Login</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
  <style>
    /* Custom styles for enhanced floating labels */
    .floating-input:focus ~ label,
    .floating-input:not(:placeholder-shown) ~ label {
      @apply transform scale-75 -translate-y-6 text-indigo-600;
    }
    
    .floating-input:focus ~ label {
      @apply text-indigo-600;
    }
    
    /* Custom animation for form entry */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .animate-fade-in-up {
      animation: fadeInUp 0.5s ease-out;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-purple-200 via-indigo-100 to-blue-200 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md p-8 bg-white rounded-2xl shadow-xl animate-fade-in-up">
    <div class="text-center mb-6">
      <h2 class="text-3xl font-bold text-gray-800">Welcome Back</h2>
      <p class="text-gray-500 text-sm mt-2">Log in to your SCM dashboard</p>
    </div>

    <form method="POST" action="{% url "Users:login_user_save" %}" class="space-y-6">
      {% csrf_token %}
      <!-- Email Input -->
      <div class="relative">
        <input type="email" name="email" id="email" required
               class="floating-input peer w-full px-4 pt-6 pb-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all duration-200"
               placeholder=" "/>
        <label for="email"
               class="absolute left-4 top-4 text-gray-500 transition-all duration-200 pointer-events-none">
          Email
        </label>
      </div>

      <!-- Password Input -->
      <div class="relative">
        <input type="password" name="password" id="password" required
               class="floating-input peer w-full px-4 pt-6 pb-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all duration-200"
               placeholder=" "/>
        <label for="password"
               class="absolute left-4 top-4 text-gray-500 transition-all duration-200 pointer-events-none">
          Password
        </label>
      </div>

      <!-- Remember me and Forgot password -->
      <div class="flex flex-col sm:flex-row justify-between items-center">
        <div class="flex items-center mb-4 sm:mb-0">
          <input type="checkbox" id="remember" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded">
          <label for="remember" class="ml-2 block text-sm text-gray-700">Remember me</label>
        </div>
        <a href="#" onclick="Dis you forgot the password" class="text-sm text-indigo-600 hover:text-indigo-500 hover:underline">Forgot password?</a>
      </div>

      <!-- Submit Button -->
      <div>
        <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-lg transition duration-300 shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
          Login
        </button>
      </div>
    </form>

    <!-- Divider -->
    <div class="mt-6 flex items-center">
      <div class="flex-grow border-t border-gray-300"></div>
      <span class="mx-4 text-gray-500 text-sm">or</span>
      <div class="flex-grow border-t border-gray-300"></div>
    </div>

    <!-- Social Login -->
    <div class="mt-6 grid grid-cols-2 gap-4">
      <button class="flex items-center justify-center py-2 px-4 border border-gray-300 rounded-md shadow-sm bg-white text-sm font-medium text-gray-700 hover:bg-gray-50 transition duration-200">
        <svg class="w-5 h-5 mr-2" viewBox="0 0 24 24" width="24" height="24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Google
      </button>
      <button class="flex items-center justify-center py-2 px-4 border border-gray-300 rounded-md shadow-sm bg-white text-sm font-medium text-gray-700 hover:bg-gray-50 transition duration-200">
        <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 24 24">
          <path d="M24 4.557c-.883.392-1.832.656-2.828.775 1.017-.609 1.798-1.574 2.165-2.724-.951.564-2.005.974-3.127 1.195-.897-.957-2.178-1.555-3.594-1.555-3.179 0-5.515 2.966-4.797 6.045-4.091-.205-7.719-2.165-10.148-5.144-1.29 2.213-.669 5.108 1.523 6.574-.806-.026-1.566-.247-2.229-.616-.054 2.281 1.581 4.415 3.949 4.89-.693.188-1.452.232-2.224.084.626 1.956 2.444 3.379 4.6 3.419-2.07 1.623-4.678 2.348-7.29 2.04 2.179 1.397 4.768 2.212 7.548 2.212 9.142 0 14.307-7.721 13.995-14.646.962-.695 1.797-1.562 2.457-2.549z"/>
        </svg>
        Twitter
      </button>
    </div>

    <div class="mt-6 text-center text-sm text-gray-600">
      Don't have an account? 
      <a href="{% url "mysite:user_register" %}" class="text-indigo-600 hover:text-indigo-500 font-medium hover:underline">Register</a>
    </div>
  </div>

  <script>
    {% comment %} // Simple form validation
    document.querySelector('form').addEventListener('submit', function(e) {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      if (!email || !password) {
        e.preventDefault();
        alert('Please fill in all fields');
        return false;
      }
      
      // In a real application, you would submit the form here
      e.preventDefault();
      alert('Login successful! (This is a demo)');
    }); {% endcomment %}
  </script>
</body>
</html>
