<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Login</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
</head>
<body class="bg-gradient-to-br from-purple-200 via-indigo-100 to-blue-200 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-md p-8 bg-white rounded-2xl shadow-xl">
    <div class="text-center mb-6">
      <h2 class="text-3xl font-bold text-gray-800">Welcome Back</h2>
      <p class="text-gray-500 text-sm">Log in to your SCM dashboard</p>
    </div>

    <form method="POST" action="{% url 'Users:login_user_save' %}" class="space-y-5">
      {% csrf_token %}
      <!-- Email Input -->
      <div class="relative">
        <input type="email" name="email" id="email" required
               class="peer w-full px-4 pt-5 pb-2 border border-gray-300 rounded-md placeholder-transparent focus:outline-none focus:ring-2 focus:ring-indigo-500"
               placeholder="Email"/>
        <label for="email"
               class="absolute left-4 top-2 text-sm text-gray-500 transition-all peer-placeholder-shown:top-3.5 peer-placeholder-shown:text-base peer-placeholder-shown:text-gray-400 peer-focus:top-2 peer-focus:text-sm peer-focus:text-indigo-600">
          Email
        </label>
      </div>

      <!-- Password Input -->
      <div class="relative">
        <input type="password" name="password" id="password" required
               class="peer w-full px-4 pt-5 pb-2 border border-gray-300 rounded-md placeholder-transparent focus:outline-none focus:ring-2 focus:ring-indigo-500"
               placeholder="Password"/>
        <label for="password"
               class="absolute left-4 top-2 text-sm text-gray-500 transition-all peer-placeholder-shown:top-3.5 peer-placeholder-shown:text-base peer-placeholder-shown:text-gray-400 peer-focus:top-2 peer-focus:text-sm peer-focus:text-indigo-600">
          Password
        </label>
      </div>

      <!-- Submit Button -->
      <div>
        <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 rounded-lg transition duration-300 shadow-md">
          Login
        </button>
      </div>
    </form>

    <div class="mt-6 text-center text-sm text-gray-600">
      Don’t have an account? 
      <a href="{% url 'mysite:user_reg' %}" class="text-indigo-600 hover:underline">Register</a>
    </div>
  </div>

</body>
</html>
